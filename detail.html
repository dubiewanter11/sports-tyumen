<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Zone Details | Sport For Everyone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
        #mini-map {
            height: 300px;
            width: 100%;
            border-radius: 12px;
        }
        .gallery-image {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }
        .gallery-image:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .feature-icon {
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
        }
        .dark .feature-icon {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }
        #lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        #lightbox.active {
            display: flex;
        }
        #lightbox img {
            max-width: 90%;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        #lightbox-close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 40px;
            cursor: pointer;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            transition: background 0.3s;
            z-index: 101;
        }
        #lightbox-close:hover {
            background: rgba(255,255,255,0.2);
        }
        body, .bg-white, .bg-slate-50, .bg-slate-900, .text-slate-900, .text-slate-600 {
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 antialiased transition-colors duration-300">
    <!-- Lightbox -->
    <div id="lightbox" onclick="closeLightbox(event)">
        <div id="lightbox-close" onclick="closeLightbox(event)">&times;</div>
        <img id="lightbox-img" src="" alt="Full size">
    </div>

    <!-- Navigation -->
    <nav class="bg-white dark:bg-slate-900 border-b border-slate-100 dark:border-slate-800 sticky top-0 z-40 transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
                    <i data-lucide="arrow-left" class="h-5 w-5 text-slate-400"></i>
                    <span class="font-semibold text-slate-600 dark:text-slate-400">Back to Map</span>
                </a>
                <div class="flex items-center gap-2">
                    <i data-lucide="activity" class="h-6 w-6 text-blue-600"></i>
                    <span class="font-bold text-slate-900 dark:text-white">SPORT FOR EVERYONE</span>
                </div>
                <button id="theme-toggle" class="p-2 rounded-lg text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" aria-label="Toggle theme">
                    <i data-lucide="sun" class="h-5 w-5 hidden dark:block"></i>
                    <i data-lucide="moon" class="h-5 w-5 block dark:hidden"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Loading State -->
        <div id="loading" class="text-center py-20">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-50 dark:bg-blue-900/30 mb-4">
                <i data-lucide="loader-2" class="h-8 w-8 text-blue-600 animate-spin"></i>
            </div
